<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Crusher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .stats-container {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { font-size: 3rem; color: #f1c40f; margin: 0; }
        p { font-size: 1.2rem; color: #bdc3c7; }

        #coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #f1c40f 0%, #d4ac0d 100%);
            border-radius: 50%;
            border: 8px solid #b7950b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        #coin:active {
            transform: scale(0.95);
        }

        .shop {
            margin-top: 40px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #0f3460;
            width: 300px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #ff4d6d; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        .upgrade-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <h1 id="coin-display">0</h1>
        <p>Coins Collected</p>
        <p>Coins per click: <span id="per-click-display">1</span></p>
    </div>

    <div id="coin">💰</div>

    <div class="shop">
        <div class="upgrade-info">
            <span>Better Hammer</span>
            <span id="upgrade-cost">Cost: 10</span>
        </div>
        <button id="upgrade-btn">Buy Upgrade (+1 per click)</button>
    </div>

    <script>
        // Game State
        let coins = 0;
        let coinsPerClick = 1;
        let upgradeCost = 10;

        // DOM Elements
        const coinDisplay = document.getElementById('coin-display');
        const perClickDisplay = document.getElementById('per-click-display');
        const upgradeCostDisplay = document.getElementById('upgrade-cost');
        const coinBtn = document.getElementById('coin');
        const upgradeBtn = document.getElementById('upgrade-btn');

        // Logic: Clicking the Coin
        coinBtn.addEventListener('click', () => {
            coins += coinsPerClick;
            updateUI();
        });

        // Logic: Buying Upgrade
        upgradeBtn.addEventListener('click', () => {
            if (coins >= upgradeCost) {
                coins -= upgradeCost;
                coinsPerClick += 1;
                upgradeCost = Math.round(upgradeCost * 1.5); // Increase cost for next time
                updateUI();
            }
        });

        // Update UI helper
        function updateUI() {
            coinDisplay.innerText = Math.floor(coins);
            perClickDisplay.innerText = coinsPerClick;
            upgradeCostDisplay.innerText = `Cost: ${upgradeCost}`;
            
            // Disable button if you can't afford it
            upgradeBtn.disabled = coins < upgradeCost;
        }

        // Initialize UI
        updateUI();
    </script>
</body>
</html>
