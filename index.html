import os

# Define the HTML content for the game
html_content = """<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Forest Survival</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            background: #1a2b1a; /* Forest Ground */
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
        }
        .bar-container {
            width: 200px;
            height: 16px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #444;
            margin-bottom: 8px;
            border-radius: 8px;
            overflow: hidden;
        }
        #hp-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.3s; }
        #hunger-bar { width: 100%; height: 100%; background: #ffa502; transition: width 0.3s; }
        #xp-bar { width: 0%; height: 100%; background: #2ed573; transition: width 0.3s; }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            visibility: hidden;
        }
        h1 { margin: 0; color: #ff4757; }
        button {
            padding: 10px 25px;
            font-size: 18px;
            background: #2ed573;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div style="font-size: 14px; margin-bottom: 2px;">Health</div>
        <div class="bar-container"><div id="hp-bar"></div></div>
        <div style="font-size: 14px; margin-bottom: 2px;">Hunger</div>
        <div class="bar-container"><div id="hunger-bar"></div></div>
        <div style="font-size: 14px; margin-bottom: 2px;">Level <span id="lvl-txt">1</span></div>
        <div class="bar-container" style="height: 8px;"><div id="xp-bar"></div></div>
        <div id="score-txt">Score: 0</div>
    </div>
    
    <div id="overlay">
        <h1>YOU PERISHED</h1>
        <p id="final-score">Score: 0</p>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('hp-bar');
const hungerBar = document.getElementById('hunger-bar');
const xpBar = document.getElementById('xp-bar');
const lvlTxt = document.getElementById('lvl-txt');
const scoreTxt = document.getElementById('score-txt');
const overlay = document.getElementById('overlay');

// Game Settings
canvas.width = 800;
canvas.height = 600;
let gameActive = true;
let score = 0;
let level = 1;
let xp = 0;
let time = 0; // For Day/Night Cycle

// Player Object
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    r: 15,
    speed: 3.5,
    hp: 100,
    hunger: 100,
    angle: 0,
    isAttacking: 0
};

const keys = {};
const enemies = [];
const items = []; // Food and XP
const particles = [];

// Input Listeners
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);
});
canvas.addEventListener('mousedown', () => { if(player.isAttacking <= 0) player.isAttacking = 15; });

function spawnEnemy() {
    if (!gameActive) return;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if(side === 0) { x = Math.random() * canvas.width; y = -20; }
    else if(side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
    else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + 20; }
    else { x = -20; y = Math.random() * canvas.height; }
    
    enemies.push({ x, y, r: 12, speed: 1 + (level * 0.2), hp: 2 });
}

function spawnItem(type, x, y) {
    items.push({ x, y, type, r: 6 });
}

function update() {
    if (!gameActive) return;

    // Movement
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    // Constraints
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

    // Hunger & HP
    player.hunger -= 0.02;
    if (player.hunger <= 0) {
        player.hunger = 0;
        player.hp -= 0.1;
    }

    if (player.isAttacking > 0) player.isAttacking--;

    // Enemies Logic
    enemies.forEach((en, i) => {
        const dx = player.x - en.x;
        const dy = player.y - en.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        en.x += (dx / dist) * en.speed;
        en.y += (dy / dist) * en.speed;

        // Player Collision
        if (dist < player.r + en.r) {
            player.hp -= 0.5;
            // Knockback
            en.x -= (dx / dist) * 20;
            en.y -= (dy / dist) * 20;
        }

        // Sword Collision
        if (player.isAttacking > 5) {
            const swordX = player.x + Math.cos(player.angle) * 30;
            const swordY = player.y + Math.sin(player.angle) * 30;
            const sDx = swordX - en.x;
            const sDy = swordY - en.y;
            const sDist = Math.sqrt(sDx*sDx + sDy*sDy);
            if (sDist < 25) {
                en.hp--;
                if (en.hp <= 0) {
                    spawnItem(Math.random() > 0.8 ? 'food' : 'xp', en.x, en.y);
                    enemies.splice(i, 1);
                    score += 10;
                }
            }
        }
    });

    // Items Logic
    items.forEach((it, i) => {
        const dx = player.x - it.x;
        const dy = player.y - it.y;
        if (Math.sqrt(dx*dx + dy*dy) < player.r + it.r) {
            if (it.type === 'food') player.hunger = Math.min(100, player.hunger + 25);
            if (it.type === 'xp') {
                xp += 20;
                if (xp >= 100) {
                    xp = 0;
                    level++;
                    player.hp = Math.min(100, player.hp + 20);
                }
            }
            items.splice(i, 1);
        }
    });

    // UI Updates
    hpBar.style.width = player.hp + '%';
    hungerBar.style.width = player.hunger + '%';
    xpBar.style.width = xp + '%';
    lvlTxt.innerText = level;
    scoreTxt.innerText = "Score: " + score;

    if (player.hp <= 0) {
        gameActive = false;
        overlay.style.visibility = 'visible';
        document.getElementById('final-score').innerText = "Score: " + score;
    }

    time += 0.002;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Items
    items.forEach(it => {
        ctx.fillStyle = it.type === 'food' ? '#ffa502' : '#2ed573';
        ctx.beginPath();
        ctx.arc(it.x, it.y, it.r, 0, Math.PI * 2);
        ctx.fill();
    });

    // Draw Enemies
    enemies.forEach(en => {
        ctx.fillStyle = '#ff4757';
        ctx.beginPath();
        ctx.arc(en.x, en.y, en.r, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = 'black';
        ctx.fillRect(en.x - 5, en.y - 3, 2, 2);
        ctx.fillRect(en.x + 3, en.y - 3, 2, 2);
    });

    // Draw Player
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    
    // Sword
    if (player.isAttacking > 0) {
        ctx.fillStyle = '#ced6e0';
        ctx.fillRect(10, -2, 35, 4);
    }

    // Body
    ctx.fillStyle = '#1e90ff';
    ctx.beginPath();
    ctx.arc(0, 0, player.r, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = 'white';
    ctx.fillRect(8, -6, 4, 4);
    ctx.fillRect(8, 2, 4, 4);
    ctx.restore();

    // Day/Night Filter
    const nightIntensity = (Math.sin(time) + 1) / 2; // 0 to 1
    ctx.fillStyle = `rgba(0, 20, 50, ${nightIntensity * 0.5})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

// Intervals
setInterval(spawnEnemy, 2000);
setInterval(() => { if(items.length < 5) spawnItem('food', Math.random()*canvas.width, Math.random()*canvas.height) }, 5000);

draw();
</script>
</body>
</html>"""

with open("index.html", "w") as f:
    f.write(html_content)
