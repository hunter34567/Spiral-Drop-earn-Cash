<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival V2 | GitHub Edition</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; }
        .bar { width: 200px; height: 12px; border: 1px solid #333; margin: 5px 0; background: #111; border-radius: 4px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff4757; transition: 0.2s; }
        #xp-fill { width: 0%; height: 100%; background: #2ed573; transition: 0.2s; }
        canvas { background: #0a0a0a; box-shadow: 0 0 40px #000; cursor: crosshair; }
        #tutorial { position: absolute; bottom: 10px; text-align: center; width: 100%; color: #666; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div>SURVIVOR LVL: <span id="lvl">1</span></div>
    <div class="bar"><div id="hp-fill"></div></div>
    <div>XP PROGRESS</div>
    <div class="bar"><div id="xp-fill"></div></div>
    <div id="score">KILLS: 0</div>
    <div id="day-cycle">TIME: DAY</div>
</div>

<div id="tutorial">WASD to Move | Click to Shoot | Collect Green Orbs to Level Up | Survive the Night</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 600;

// Game State
let player = { x: 450, y: 300, r: 12, hp: 100, maxHp: 100, speed: 3.5, xp: 0, lvl: 1, angle: 0 };
let bullets = [];
let enemies = [];
let particles = [];
let gems = [];
let kills = 0;
let frame = 0;
let isDay = true;
let keys = {};

// Input
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
});
window.addEventListener('mousedown', () => {
    bullets.push({ x: player.x, y: player.y, vx: Math.cos(player.angle) * 7, vy: Math.sin(player.angle) * 7, r: 4 });
});

function spawnEnemy() {
    let x, y;
    if (Math.random() < 0.5) {
        x = Math.random() < 0.5 ? -30 : canvas.width + 30;
        y = Math.random() * canvas.height;
    } else {
        x = Math.random() * canvas.width;
        y = Math.random() < 0.5 ? -30 : canvas.height + 30;
    }
    enemies.push({ x, y, r: 15, hp: 1 + (player.lvl * 0.5), speed: 1 + Math.random() });
}

function createExplosion(x, y, color) {
    for (let i = 0; i < 8; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 1, color });
    }
}

function update() {
    frame++;
    
    // Day/Night Cycle (Switches every 1000 frames)
    if (frame % 1000 === 0) {
        isDay = !isDay;
        document.getElementById('day-cycle').innerText = `TIME: ${isDay ? 'DAY' : 'NIGHT'}`;
    }

    // Movement
    if (keys['KeyW']) player.y -= player.speed;
    if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed;
    if (keys['KeyD']) player.x += player.speed;

    // Bullet Logic
    bullets.forEach((b, bi) => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(bi, 1);
    });

    // Enemy Logic
    if (frame % (isDay ? 60 : 20) === 0) spawnEnemy();
    enemies.forEach((en, ei) => {
        let dx = player.x - en.x;
        let dy = player.y - en.y;
        let dist = Math.hypot(dx, dy);
        en.x += (dx / dist) * en.speed;
        en.y += (dy / dist) * en.speed;

        // Player collision
        if (dist < player.r + en.r) {
            player.hp -= 0.5;
            createExplosion(player.x, player.y, '#f00');
        }

        // Bullet collision
        bullets.forEach((b, bi) => {
            if (Math.hypot(b.x - en.x, b.y - en.y) < en.r) {
                en.hp--;
                bullets.splice(bi, 1);
                if (en.hp <= 0) {
                    kills++;
                    gems.push({ x: en.x, y: en.y, r: 5 });
                    enemies.splice(ei, 1);
                    createExplosion(en.x, en.y, '#ff4757');
                }
            }
        });
    });

    // Gem Collection
    gems.forEach((g, gi) => {
        if (Math.hypot(player.x - g.x, player.y - g.y) < player.r + g.r) {
            player.xp += 20;
            gems.splice(gi, 1);
            if (player.xp >= 100) {
                player.lvl++;
                player.xp = 0;
                player.maxHp += 10;
                player.hp = player.maxHp;
            }
        }
    });

    particles.forEach((p, pi) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if (p.life <= 0) particles.splice(pi, 1);
    });

    // UI
    document.getElementById('hp-fill').style.width = (player.hp / player.maxHp * 100) + '%';
    document.getElementById('xp-fill').style.width = player.xp + '%';
    document.getElementById('lvl').innerText = player.lvl;
    document.getElementById('score').innerText = `KILLS: ${kills}`;

    if (player.hp <= 0) location.reload();
}

function draw() {
    ctx.fillStyle = isDay ? '#0a0a0a' : '#020205';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid effect
    ctx.strokeStyle = isDay ? '#111' : '#050515';
    for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }
    for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(900,i); ctx.stroke(); }

    // Gems
    ctx.fillStyle = '#2ed573';
    gems.forEach(g => { ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI*2); ctx.fill(); });

    // Enemies
    ctx.fillStyle = '#ff4757';
    enemies.forEach(en => { ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill(); });

    // Bullets
    ctx.fillStyle = '#f1c40f';
    bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });

    // Particles
    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
    ctx.globalAlpha = 1;

    // Player
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = '#00d2ff';
    ctx.fillRect(-12, -12, 24, 24); // Body
    ctx.fillStyle = '#fff';
    ctx.fillRect(8, -8, 6, 4); // Eye 1
    ctx.fillRect(8, 4, 6, 4);  // Eye 2
    ctx.restore();

    // Night overlay (Vignette)
    if (!isDay) {
        let grad = ctx.createRadialGradient(player.x, player.y, 50, player.x, player.y, 250);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.9)');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0, canvas.width, canvas.height);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
