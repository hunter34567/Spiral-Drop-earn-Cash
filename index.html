<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D WAR: BATTALION COMMAND</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050500; font-family: 'Courier New', Courier, monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none;
            background: rgba(0, 20, 0, 0.8); padding: 20px; border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0,255,0,0.2); z-index: 20;
        }
        #hp-container { width: 200px; height: 12px; background: #111; border: 1px solid #0f0; margin: 10px 0; }
        #hp-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.3s; }
        #heat-fill { width: 0%; height: 100%; background: #f00; }
        #radar {
            position: absolute; bottom: 30px; right: 30px; width: 160px; height: 160px;
            background: rgba(0, 30, 0, 0.7); border: 2px solid #0f0; border-radius: 50%;
            box-shadow: inset 0 0 20px #0f0; z-index: 20;
        }
        #scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 100; opacity: 0.4;
        }
        .label { font-size: 10px; text-transform: uppercase; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="scanlines"></div>
    <div id="ui">
        <div style="font-weight: bold; letter-spacing: 2px;">VANGUARD-OS v4.0</div>
        <hr style="border:0; border-top:1px solid #0f0;">
        <div>KILLS: <span id="score">0</span></div>
        <div class="label" style="margin-top:10px;">Hull Integrity</div>
        <div id="hp-container"><div id="hp-fill"></div></div>
        <div class="label">Weapon Heat (MG)</div>
        <div id="hp-container" style="height:6px;"><div id="heat-fill"></div></div>
        <div id="missile-ui" style="font-size:11px; margin-top:10px; color:#ff0;">MISSILE: READY [F]</div>
        <div style="font-size:9px; margin-top:15px; opacity:0.6;">WASD: Drive | SPACE: Fire | SHIFT: MG</div>
    </div>
    <div id="radar"><div id="radar-dots" style="position: relative; width: 100%; height: 100%;"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Core Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x332211, 20, 160);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x221100);
        document.body.appendChild(renderer.domElement);

        // --- Game State ---
        let score = 0, health = 100, mgHeat = 0, mgOverheated = false, lastMissile = 0, shake = 0;
        const keys = {}, bullets = [], missiles = [], enemies = [], squad = [], props = [], particles = [];

        // --- Lights ---
        scene.add(new THREE.AmbientLight(0x444455, 0.6));
        const sun = new THREE.DirectionalLight(0xffcc88, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // --- Environment ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x1a1510 }));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        function createProp(x, z) {
            const h = 2 + Math.random() * 6;
            const p = new THREE.Mesh(new THREE.BoxGeometry(3, h, 3), new THREE.MeshStandardMaterial({color: 0x444444}));
            p.position.set(x, h/2, z);
            p.userData = { hp: 5 };
            scene.add(p);
            props.push(p);
        }
        for(let i=0; i<30; i++) createProp((Math.random()-0.5)*200, (Math.random()-0.5)*200);

        // --- Player ---
        const player = new THREE.Group();
        const pBody = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 3), new THREE.MeshStandardMaterial({color: 0x112211}));
        const pTurret = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.2), new THREE.MeshStandardMaterial({color: 0x0a110a}));
        pTurret.position.y = 0.6;
        player.add(pBody, pTurret);
        scene.add(player);

        // --- Squad AI ---
        function spawnWingman(offsetX, offsetZ) {
            const w = new THREE.Group();
            const wBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 2.2), new THREE.MeshStandardMaterial({color: 0x224422}));
            w.add(wBody);
            w.userData = { offsetX, offsetZ, lastShot: 0 };
            scene.add(w);
            squad.push(w);
        }
        spawnWingman(-5, -5);
        spawnWingman(5, -5);

        // --- Utility Functions ---
        function createExplosion(pos, color = 0xffaa00, count = 12) {
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({color, transparent: true}));
                p.position.copy(pos);
                p.userData = { 
                    vel: new THREE.Vector3((Math.random()-0.5), Math.random(), (Math.random()-0.5)).multiplyScalar(0.6), 
                    life: 1.0 
                };
                particles.push(p);
                scene.add(p);
            }
        }

        function spawnEnemy() {
            const e = new THREE.Group();
            const eBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1, 3.5), new THREE.MeshStandardMaterial({color: 0x331111}));
            e.add(eBody);
            e.position.set((Math.random()-0.5)*250, 0.5, (Math.random()-0.5)*250);
            e.userData = { hp: 4, lastShot: 0 };
            enemies.push(e);
            scene.add(e);
        }
        for(let i=0; i<10; i++) spawnEnemy();

        function fire(owner, isPlayer, isMG = false, isMissile = false) {
            const b = new THREE.Mesh(
                isMissile ? new THREE.CylinderGeometry(0.1, 0.1, 0.8) : new THREE.SphereGeometry(isMG ? 0.1 : 0.25), 
                new THREE.MeshBasicMaterial({color: isPlayer ? (isMG ? 0xccff00 : 0x00ff00) : 0xff3300})
            );
            b.position.copy(owner.position).add(new THREE.Vector3(0, 0.7, 0));
            
            let dir = new THREE.Vector3(0,0,1).applyQuaternion(owner.quaternion);
            b.userData = { vel: dir.multiplyScalar(isMG ? 2.8 : 1.6), isPlayer, isMG, isMissile };
            
            if(isMissile) {
                let closest = null, minDist = 200;
                enemies.forEach(en => {
                    const d = en.position.distanceTo(owner.position);
                    if(d < minDist) { minDist = d; closest = en; }
                });
                b.userData.target = closest;
                b.userData.life = 5;
            }

            bullets.push(b);
            scene.add(b);
            if(isPlayer && !isMG) shake = 0.6;
        }

        // --- Input ---
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        // --- Game Loop ---
        function update() {
            // Player Drive
            if(keys['KeyW']) player.translateZ(0.22);
            if(keys['KeyS']) player.translateZ(-0.12);
            if(keys['KeyA']) player.rotation.y += 0.04;
            if(keys['KeyD']) player.rotation.y -= 0.04;

            // Combat
            if(keys['Space'] && Date.now() - (player.userData.lastFire||0) > 900) {
                fire(player, true); player.userData.lastFire = Date.now();
            }
            if(keys['KeyF']) {
                if(Date.now() - lastMissile > 5000) { fire(player, true, false, true); lastMissile = Date.now(); }
            }
            if(keys['ShiftLeft'] && !mgOverheated) {
                fire(player, true, true);
                mgHeat = Math.min(100, mgHeat + 1.5);
                if(mgHeat >= 100) mgOverheated = true;
            } else {
                mgHeat = Math.max(0, mgHeat - 0.6);
                if(mgHeat < 20) mgOverheated = false;
            }

            // Squad AI behavior
            squad.forEach(w => {
                const targetPos = player.position.clone().add(new THREE.Vector3(w.userData.offsetX, 0, w.userData.offsetZ).applyQuaternion(player.quaternion));
                w.position.lerp(targetPos, 0.05);
                w.rotation.y = THREE.MathUtils.lerp(w.rotation.y, player.rotation.y, 0.1);
                
                // Squad auto-fire
                if(Date.now() - w.userData.lastShot > 3000) {
                    enemies.forEach(en => {
                        if(en.position.distanceTo(w.position) < 40) {
                            fire(w, true, true); w.userData.lastShot = Date.now();
                        }
                    });
                }
            });

            // UI Updates
            document.getElementById('heat-fill').style.width = mgHeat + "%";
            document.getElementById('heat-fill').style.background = mgOverheated ? "#f0f" : "#f00";
            const mCool = Math.max(0, 5000 - (Date.now() - lastMissile));
            document.getElementById('missile-ui').innerText = mCool > 0 ? `MISSILE RELOAD: ${(mCool/1000).toFixed(1)}s` : "MISSILE: READY [F]";

            // Camera & Shake
            if(shake > 0) shake *= 0.9;
            const idealCam = new THREE.Vector3(0, 7, -14).applyMatrix4(player.matrixWorld);
            camera.position.lerp(idealCam, 0.1);
            camera.position.x += (Math.random()-0.5) * shake;
            camera.position.y += (Math.random()-0.5) * shake;
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0,1,0)));

            // Bullet & Missile Logic
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                if(b.userData.isMissile && b.userData.target && b.userData.target.parent) {
                    const d = new THREE.Vector3().subVectors(b.userData.target.position, b.position).normalize();
                    b.lookAt(b.userData.target.position);
                    b.position.add(d.multiplyScalar(0.9));
                } else {
                    b.position.add(b.userData.vel);
                }

                // Hit detection (Props)
                props.forEach((p, pi) => {
                    if(b.position.distanceTo(p.position) < 3) {
                        p.userData.hp--;
                        createExplosion(b.position, 0x555555, 5);
                        if(p.userData.hp <= 0) { createExplosion(p.position, 0x333333, 20); scene.remove(p); props.splice(pi, 1); }
                        scene.remove(b); bullets.splice(i, 1);
                    }
                });

                if(!b) continue;

                // Hit detection (Enemies)
                if(b.userData.isPlayer) {
                    enemies.forEach((en, ei) => {
                        if(b.position.distanceTo(en.position) < 2.5) {
                            en.userData.hp -= b.userData.isMissile ? 5 : (b.userData.isMG ? 0.3 : 1);
                            createExplosion(b.position, 0xffaa00, 5);
                            if(en.userData.hp <= 0) {
                                createExplosion(en.position, 0xff3300, 25);
                                scene.remove(en); enemies.splice(ei, 1);
                                score++; document.getElementById('score').innerText = score;
                                spawnEnemy();
                            }
                            scene.remove(b); bullets.splice(i, 1);
                        }
                    });
                } else {
                    if(b.position.distanceTo(player.position) < 2) {
                        health -= 10;
                        shake = 1.0;
                        document.getElementById('hp-fill').style.width = health + "%";
                        scene.remove(b); bullets.splice(i, 1);
                        if(health <= 0) location.reload();
                    }
                }
                
                if(b && b.position.length() > 300) { scene.remove(b); bullets.splice(i, 1); }
            }

            // Enemy AI
            enemies.forEach(en => {
                const d = en.position.distanceTo(player.position);
                if(d < 100) {
                    en.lookAt(player.position);
                    if(d > 20) en.translateZ(0.08);
                    if(Date.now() - en.userData.lastShot > 2500) { fire(en, false); en.userData.lastShot = Date.now(); }
                }
            });

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.position.add(p.userData.vel);
                p.userData.life -= 0.02;
                p.scale.setScalar(p.userData.life);
                if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }

            // Radar
            const dots = document.getElementById('radar-dots');
            dots.innerHTML = '';
            enemies.forEach(en => {
                const dot = document.createElement('div');
                dot.style.cssText = `position:absolute;width:4px;height:4px;background:#f00;border-radius:50%;left:${(en.position.x/250)*80+80}px;top:${(en.position.z/250)*80+80}px;`;
                dots.appendChild(dot);
            });

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        update();
    </script>
</body>
</html>
