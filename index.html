<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Drop - Complete Edition</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            user-select: none;
            touch-action: none;
        }
        canvas { 
            background: #2c3e50; 
            box-shadow: 0 0 30px rgba(0,0,0,0.7); 
            border-radius: 12px; 
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        #ui { 
            position: absolute; 
            top: 20px; 
            text-align: center; 
            pointer-events: none; 
            width: 100%; 
            z-index: 10;
        }
        .stat { 
            font-size: 22px; 
            font-weight: 800; 
            margin: 5px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }
        #highScoreLabel { color: #f1c40f; }
        #coinLabel { color: #2ecc71; }
        
        #msg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 20;
        }

        #msg { 
            font-size: 48px; 
            display: none; 
            text-align: center; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat" id="highScoreLabel">BEST: <span id="highScoreVal">0</span></div>
        <div class="stat">LEVEL: <span id="levelVal">1</span></div>
        <div class="stat" id="coinLabel">COINS: <span id="coinVal">0</span></div>
    </div>

    <div id="msg-overlay">
        <div id="msg">LEVEL CLEAR!<br><span style="color:#2ecc71">+10 COINS</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('levelVal');
    const coinDisplay = document.getElementById('coinVal');
    const highScoreDisplay = document.getElementById('highScoreVal');
    const msgDisplay = document.getElementById('msg');

    // Configuration
    canvas.width = 400;
    canvas.height = 700;
    const centerX = canvas.width / 2;
    const pillarWidth = 50;
    const gravity = 0.3;
    const bounceStrength = -8;

    // Game Variables
    let level = 1;
    let coins = 0;
    let highScore = localStorage.getItem('spiralDropBest') || 0;
    let rotation = 0;
    let isDragging = false;
    let lastMouseX = 0;
    let gameActive = true;

    // Initialize High Score UI
    highScoreDisplay.innerText = highScore;

    let ball = {
        y: 100,
        dy: 0,
        r: 12,
        color: '#e74c3c'
    };

    let platforms = [];
    const platformSpacing = 200;
    const platformsPerLevel = 6;

    function initLevel() {
        platforms = [];
        gameActive = true;
        
        for (let i = 0; i < platformsPerLevel; i++) {
            let gapAngle = Math.random() * Math.PI * 2;
            // Red danger zones spawn more frequently as levels increase
            let dangerAngle = gapAngle + 1 + Math.random() * (Math.PI - 1);
            
            platforms.push({
                y: 400 + (i * platformSpacing),
                gapStart: gapAngle,
                gapEnd: gapAngle + 0.9, 
                dangerStart: dangerAngle,
                dangerEnd: dangerAngle + 0.5,
                isGoal: false
            });
        }
        
        // Add the Golden Goal platform
        platforms.push({ 
            y: 400 + (platformsPerLevel * platformSpacing), 
            isGoal: true 
        });

        ball.y = 100;
        ball.dy = 0;
    }

    // Input Controllers
    const startRotate = (x) => { isDragging = true; lastMouseX = x; };
    const moveRotate = (x) => {
        if (isDragging) {
            let delta = x - lastMouseX;
            rotation += delta * 0.012;
            lastMouseX = x;
        }
    };
    const endRotate = () => { isDragging = false; };

    window.addEventListener('mousedown', e => startRotate(e.clientX));
    window.addEventListener('mousemove', e => moveRotate(e.clientX));
    window.addEventListener('mouseup', endRotate);
    window.addEventListener('touchstart', e => startRotate(e.touches[0].clientX));
    window.addEventListener('touchmove', e => moveRotate(e.touches[0].clientX));
    window.addEventListener('touchend', endRotate);

    function update() {
        if (!gameActive) return;

        ball.dy += gravity;
        ball.y += ball.dy;

        platforms.forEach(p => {
            // Calculate platform position relative to the ball's focus point (y=300)
            let platformScreenY = p.y - ball.y + 300;

            // Collision check when falling
            if (ball.dy > 0 && platformScreenY > 290 && platformScreenY < 315) {
                
                // Determine ball's current position relative to rotation
                let angle = (Math.PI / 2 - rotation) % (Math.PI * 2);
                if (angle < 0) angle += Math.PI * 2;

                let inGap = angle > p.gapStart && angle < p.gapEnd;
                
                if (!inGap) {
                    if (p.isGoal) {
                        completeLevel();
                    } else {
                        // Check for Danger Zone
                        let dStart = p.dangerStart % (Math.PI * 2);
                        let dEnd = p.dangerEnd % (Math.PI * 2);
                        
                        // Handle angle wrapping for danger zones
                        let inDanger = false;
                        if (dStart < dEnd) {
                            inDanger = angle > dStart && angle < dEnd;
                        } else {
                            inDanger = angle > dStart || angle < dEnd;
                        }

                        if (inDanger) {
                            gameOver();
                        } else {
                            ball.dy = bounceStrength;
                            ball.y = p.y - 10;
                        }
                    }
                }
            }
        });

        // Safety reset if ball glitches out
        if (ball.y < -500) ball.y = 100;
    }

    function completeLevel() {
        gameActive = false;
        coins += 10;
        coinDisplay.innerText = coins;

        // High Score logic
        if (level > highScore) {
            highScore = level;
            localStorage.setItem('spiralDropBest', highScore);
            highScoreDisplay.innerText = highScore;
            msgDisplay.innerHTML = "NEW RECORD!<br>LEVEL " + level + " CLEAR!";
        } else {
            msgDisplay.innerHTML = "LEVEL CLEAR!<br><span style='color:#2ecc71'>+10 COINS</span>";
        }

        level++;
        levelDisplay.innerText = level;
        
        msgDisplay.style.display = 'block';
        setTimeout(() => {
            msgDisplay.style.display = 'none';
            initLevel();
        }, 1200);
    }

    function gameOver() {
        gameActive = false;
        alert("CRASHED! Level " + level + " will restart.");
        initLevel();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Central Pillar
        let pillarGradient = ctx.createLinearGradient(centerX-25, 0, centerX+25, 0);
        pillarGradient.addColorStop(0, '#34495e');
        pillarGradient.addColorStop(0.5, '#5d6d7e');
        pillarGradient.addColorStop(1, '#34495e');
        ctx.fillStyle = pillarGradient;
        ctx.fillRect(centerX - pillarWidth/2, 0, pillarWidth, canvas.height);

        // Draw Platforms
        platforms.forEach(p => {
            let screenY = p.y - ball.y + 300;
            if (screenY < -100 || screenY > canvas.height + 100) return;

            ctx.save();
            ctx.translate(centerX, screenY);
            ctx.rotate(rotation);

            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            
            // Draw Main Platform Ring
            ctx.strokeStyle = p.isGoal ? '#f1c40f' : '#ecf0f1';
            ctx.beginPath();
            ctx.arc(0, 0, 100, 0, Math.PI * 2);
            ctx.stroke();

            // Cut the Gap
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(0, 0, 100, p.gapStart, p.gapEnd);
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';

            // Draw Danger Zone
            if (!p.isGoal) {
                ctx.strokeStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(0, 0, 100, p.dangerStart, p.dangerEnd);
                ctx.stroke();
            }

            ctx.restore();
        });

        // Draw Ball
        ctx.fillStyle = ball.color;
        ctx.beginPath();
        ctx.arc(centerX, 300, ball.r, 0, Math.PI * 2);
        ctx.fill();
        // Add ball shine
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(centerX - 4, 296, 4, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    // Start Game
    initLevel();
    draw();
</script>
</body>
</html>
