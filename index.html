<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival V11 | Extraction</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 100; }
        .bar-container { width: 300px; height: 22px; border: 2px solid #222; background: rgba(0,0,0,0.8); border-radius: 4px; position: relative; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #d63031, #ff7675); transition: 0.2s; }
        
        #minimap { 
            position: absolute; bottom: 20px; right: 20px; width: 180px; height: 180px; 
            background: rgba(0, 40, 0, 0.4); border: 2px solid #00ff41; border-radius: 50%; overflow: hidden;
        }
        #time-display { position: absolute; top: 20px; right: 20px; font-size: 28px; font-weight: bold; color: #fdcb6e; text-shadow: 0 0 10px rgba(253, 203, 110, 0.5); }
        #alert { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 40px; color: #fab1a0; opacity: 0; transition: 1s; font-weight: bold; text-transform: uppercase; }
        canvas { background: #0c0c0c; border: 4px solid #1a1a1a; box-shadow: 0 0 50px rgba(0,0,0,1); }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 12px; letter-spacing: 2px; color: #aaa;">VITAL SIGNS</div>
    <div class="bar-container"><div id="hp-fill"></div></div>
    <div id="scrap-display" style="font-size: 32px; color: #ffeaa7;">$ 0</div>
</div>

<div id="time-display">06:00 PM</div>
<div id="alert">EXTRACTOR INBOUND</div>
<div id="minimap"><canvas id="m-canvas" width="180" height="180"></canvas></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('m-canvas');
const mCtx = mCanvas.getContext('2d');

canvas.width = 1200; canvas.height = 800;

// System Variables
let frame = 0, scrap = 0, hour = 18, minute = 0;
let extractReady = false, extractX = 0, extractY = 0;
let player = { x: 600, y: 400, r: 16, hp: 100, maxHp: 100, speed: 4.8, angle: 0 };
let entities = { enemies: [], bullets: [], blood: [], drops: [] };
let keys = {};

// Input Logic
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function spawnEnemy() {
    const side = Math.floor(Math.random() * 4);
    let x = side % 2 === 0 ? Math.random() * 1200 : (side === 1 ? 1250 : -50);
    let y = side % 2 !== 0 ? Math.random() * 800 : (side === 0 ? -50 : 850);
    let isHeavy = Math.random() > 0.9;
    entities.enemies.push({ 
        x, y, r: isHeavy ? 28 : 16, 
        hp: (isHeavy ? 15 : 3) + (hour >= 23 ? 10 : 0), 
        speed: (isHeavy ? 1.5 : 2.5) + (hour >= 22 ? 1 : 0),
        color: isHeavy ? '#6c5ce7' : '#ff7675'
    });
}

function update() {
    frame++;
    
    // Time & Event Management
    if (frame % 8 === 0) {
        minute++;
        if (minute >= 60) { minute = 0; hour++; }
        if (hour >= 24) hour = 0;
        document.getElementById('time-display').innerText = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')} ${hour >= 12 ? 'PM' : 'AM'}`;
        
        // Extraction Spawn at Midnight
        if (hour === 0 && !extractReady) {
            extractReady = true;
            extractX = Math.random() * 800 + 200;
            extractY = Math.random() * 400 + 200;
            document.getElementById('alert').style.opacity = 1;
        }
    }

    // Player Movement
    if (keys['KeyW']) player.y -= player.speed;
    if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed;
    if (keys['KeyD']) player.x += player.speed;

    // Enemy Spawning - Difficulty spikes after 10 PM
    let spawnRate = hour >= 22 ? 15 : 45;
    if (frame % spawnRate === 0) spawnEnemy();

    // AI and Collision
    entities.enemies.forEach((en, ei) => {
        let dist = Math.hypot(player.x - en.x, player.y - en.y);
        en.x += ((player.x - en.x) / dist) * en.speed;
        en.y += ((player.y - en.y) / dist) * en.speed;

        if (dist < player.r + en.r) player.hp -= 0.5;

        entities.bullets.forEach((b, bi) => {
            if (Math.hypot(b.x - en.x, b.y - en.y) < en.r) {
                en.hp--;
                entities.bullets.splice(bi, 1);
                // Hit Effects
                for(let i=0; i<2; i++) entities.blood.push({x: en.x, y: en.y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1});
                
                if (en.hp <= 0) {
                    scrap += (en.r > 20 ? 200 : 50);
                    entities.enemies.splice(ei, 1);
                }
            }
        });
    });

    // Bullets
    entities.bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > 1200 || b.y < 0 || b.y > 800) entities.bullets.splice(i, 1);
    });

    // Extraction Check
    if (extractReady && Math.hypot(player.x - extractX, player.y - extractY) < 50) {
        alert(`EXTRACTION SUCCESSFUL! SCRAP COLLECTED: $${scrap}`);
        location.reload();
    }

    // UI Updates
    document.getElementById('hp-fill').style.width = player.hp + '%';
    document.getElementById('scrap-display').innerText = `$ ${scrap}`;
    if (player.hp <= 0) { alert("MIA: YOU DIED IN THE ZONE"); location.reload(); }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    mCtx.clearRect(0, 0, 180, 180);

    // Blood Stains
    entities.blood.forEach((bl, i) => {
        ctx.fillStyle = `rgba(214, 48, 49, ${bl.life})`;
        ctx.fillRect(bl.x, bl.y, 3, 3);
        bl.life -= 0.01; if (bl.life <= 0) entities.blood.splice(i, 1);
    });

    // Extraction Zone
    if (extractReady) {
        ctx.strokeStyle = '#00ff41';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(extractX, extractY, 50 + Math.sin(frame/10)*10, 0, Math.PI*2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(0, 255, 65, 0.1)';
        ctx.fill();
    }

    // Enemies
    entities.enemies.forEach(en => {
        ctx.fillStyle = en.color;
        ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();
        // Minimap
        mCtx.fillStyle = '#ff7675';
        mCtx.fillRect(90 + (en.x - player.x)/10, 90 + (en.y - player.y)/10, 3, 3);
    });

    // Bullets
    ctx.fillStyle = '#fdcb6e';
    entities.bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });

    // Player
    ctx.fillStyle = '#0984e3';
    ctx.fillRect(player.x-16, player.y-16, 32, 32);
    mCtx.fillStyle = '#0984e3';
    mCtx.fillRect(88, 88, 4, 4); // Center of minimap

    // Vignette / Lighting
    let darkness = (hour >= 20 || hour < 6) ? 0.7 : 0;
    let grd = ctx.createRadialGradient(player.x, player.y, 50, player.x, player.y, 400);
    grd.addColorStop(0, "rgba(0,0,0,0)");
    grd.addColorStop(1, `rgba(0,0,0,${darkness})`);
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,1200,800);

    update();
    requestAnimationFrame(draw);
}

window.onmousedown = (e) => {
    let r = canvas.getBoundingClientRect();
    let angle = Math.atan2(e.clientY - r.top - player.y, e.clientX - r.left - player.x);
    entities.bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*15, vy: Math.sin(angle)*15 });
};

draw();
</script>
</body>
</html>
