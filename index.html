<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiral Drop - Skin Master</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; user-select: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; display: none; }
        #score-container { font-size: 42px; font-weight: 900; }
        .stat-box { display: inline-block; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px; margin: 5px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
        
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; color: white; }
        .play-btn { background: #4caf50; color: white; font-size: 28px; font-weight: bold; padding: 15px 60px; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin: 10px; }
        
        #revive-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); width: 80%; max-width: 350px; border-radius: 30px; display: none; z-index: 100; flex-direction: column; padding: 30px; border: 2px solid #ff9800; color: white; text-align: center; }
        .revive-btn { background: #ff9800; border: none; color: white; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; width: 100%; }
        .shield-btn { background: #2196f3; border: none; color: white; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; width: 100%; }
        
        #shop-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,15,0.98); width: 90%; max-width: 400px; height: 80vh; border-radius: 30px; display: none; z-index: 110; flex-direction: column; padding: 20px; border: 2px solid #ffd700; color: white; }
        #skin-list { overflow-y: auto; flex-grow: 1; padding-right: 10px; }
        .skin-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 12px; margin: 8px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .skin-preview { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; }
        .shop-btn-action { padding: 8px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="font-size: 50px; color: #4caf50; margin-bottom:0;">SPIRAL DROP</h1>
    <p style="color: #aaa; margin-top:0;">BEST: <span id="menu-high-score">0</span></p>
    <div style="margin-bottom: 20px;">
        <span class="stat-box">🪙 <span id="menu-coins">0</span></span>
        <span class="stat-box">🛡️ <span id="menu-shields">0</span></span>
    </div>
    <button class="play-btn" id="start-btn">PLAY</button>
    <button id="shop-btn-menu" style="background:#ffd700; border:none; padding:12px 30px; border-radius:25px; font-weight:bold; cursor:pointer;">🛒 SKINS SHOP</button>
</div>

<div id="ui">
    <div id="score-container"><span id="score">0</span></div>
    <div style="font-size:12px; color:#aaa;">BEST: <span id="game-high-score">0</span></div>
    <div class="stat-box">🪙 <span id="coins">0</span></div>
    <div class="stat-box">🛡️ <span id="shields">0</span></div>
</div>

<div id="revive-menu">
    <h2 style="color: #ff9800;">CRASHED!</h2>
    <p>Keep your score of <span id="current-revive-score">0</span>?</p>
    <button class="revive-btn" id="coin-revive-btn">USE 🪙 200</button>
    <button class="shield-btn" id="shield-revive-btn">USE 🛡️ 1 SHIELD</button>
    <button style="color:#888; background:none; border:none; margin-top:10px; cursor:pointer;" id="skip-revive-btn">NO THANKS, RESTART</button>
</div>

<div id="shop-menu">
    <div id="close-shop" style="text-align:right; cursor:pointer; font-size:24px;">✕</div>
    <h2 style="text-align: center; color: #ffd700; margin-top:0;">BALL SKINS</h2>
    <div id="skin-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/** MASTER DATA **/
const SAVE_KEY = 'SpiralDrop_Final_v4';
let playerData = JSON.parse(localStorage.getItem(SAVE_KEY)) || {
    coins: 200,
    shields: 3,
    highScore: 0,
    currentLevel: 1,
    currentSkin: 0,
    ownedSkins: [0]
};

const SKINS = [
    { name: "Classic", color: 0xffffff, price: 0 },
    { name: "Toxic", color: 0x32ff00, price: 300 },
    { name: "Blood", color: 0xff0000, price: 600 },
    { name: "Ocean", color: 0x00ccff, price: 1000 },
    { name: "Royal", color: 0x9c27b0, price: 1500 },
    { name: "Orange", color: 0xff9800, price: 2000 },
    { name: "Lava", color: 0xff4500, price: 3000 },
    { name: "Gold", color: 0xffd700, price: 5000 },
    { name: "Galaxy", color: 0x222222, price: 10000 }
];

function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify(playerData)); }

function updateUI() {
    document.getElementById('menu-coins').innerText = playerData.coins;
    document.getElementById('menu-shields').innerText = playerData.shields;
    document.getElementById('menu-high-score').innerText = playerData.highScore;
    document.getElementById('coins').innerText = playerData.coins;
    document.getElementById('shields').innerText = playerData.shields;
    document.getElementById('game-high-score').innerText = playerData.highScore;
}

/** SHOP LOGIC **/
function renderShop() {
    const list = document.getElementById('skin-list');
    list.innerHTML = '';
    SKINS.forEach((skin, index) => {
        const isOwned = playerData.ownedSkins.includes(index);
        const isEquipped = playerData.currentSkin === index;
        
        let btnHTML = '';
        if (isEquipped) {
            btnHTML = '<span style="color:#4caf50; font-weight:bold;">EQUIPPED</span>';
        } else if (isOwned) {
            btnHTML = `<button class="shop-btn-action" style="background:#2196f3; color:white;" onclick="equip(${index})">EQUIP</button>`;
        } else {
            btnHTML = `<button class="shop-btn-action" style="background:#ffd700; color:black;" onclick="buy(${index})">🪙 ${skin.price}</button>`;
        }

        const item = document.createElement('div');
        item.className = 'skin-item';
        item.innerHTML = `
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="skin-preview" style="background:#${skin.color.toString(16).padStart(6, '0')}"></div>
                <span style="font-weight:bold;">${skin.name}</span>
            </div>
            ${btnHTML}
        `;
        list.appendChild(item);
    });
}

window.buy = (i) => {
    if (playerData.coins >= SKINS[i].price) {
        playerData.coins -= SKINS[i].price;
        playerData.ownedSkins.push(i);
        saveGame();
        renderShop();
        updateUI();
    } else { alert("Not enough coins!"); }
};

window.equip = (i) => {
    playerData.currentSkin = i;
    saveGame();
    renderShop();
    if (ball) ball.material.color.setHex(SKINS[i].color);
};

/** ENGINE & GAMEPLAY **/
let scene, camera, renderer, ball, tower, platforms = [];
let score = 0, isPressing = false, gameOver = false;
let ballVelocity = 0, gravity = -0.012, bounce = 0.2, smash = -0.35;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0x404040, 2), new THREE.DirectionalLight(0xffffff, 1));
    updateUI();

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        createLevel();
    };
    
    document.getElementById('shop-btn-menu').onclick = () => { 
        document.getElementById('shop-menu').style.display = 'flex'; 
        renderShop();
    };
    document.getElementById('close-shop').onclick = () => { document.getElementById('shop-menu').style.display = 'none'; };

    document.getElementById('coin-revive-btn').onclick = () => {
        if (playerData.coins >= 200) { playerData.coins -= 200; continueGame(); } else { alert("Not enough coins!"); }
    };
    document.getElementById('shield-revive-btn').onclick = () => {
        if (playerData.shields > 0) { playerData.shields -= 1; continueGame(); } else { alert("No shields!"); }
    };
    document.getElementById('skip-revive-btn').onclick = () => {
        if (score > playerData.highScore) playerData.highScore = score;
        document.getElementById('revive-menu').style.display = 'none';
        document.getElementById('main-menu').style.display = 'flex';
        document.getElementById('ui').style.display = 'none';
        saveGame(); updateUI();
    };

    window.addEventListener('mousedown', () => { if(!gameOver) isPressing = true; });
    window.addEventListener('mouseup', () => isPressing = false);
    window.addEventListener('touchstart', (e) => { if(!gameOver) isPressing = true; });
    window.addEventListener('touchend', () => isPressing = false);
}

function continueGame() {
    document.getElementById('revive-menu').style.display = 'none';
    gameOver = false;
    ball.position.y += 2.5; 
    ballVelocity = 0;
    saveGame(); updateUI();
}

function createLevel() {
    if(tower) scene.remove(tower);
    if(ball) scene.remove(ball);
    platforms = []; gameOver = false; score = 0;
    document.getElementById('score').innerText = "0";
    tower = new THREE.Group();
    scene.add(tower);

    const stackCount = 15 + (playerData.currentLevel * 2);
    for (let i = 0; i < stackCount; i++) {
        const p = new THREE.Group();
        p.position.y = -i * 1.5;
        p.rotation.y = i * 0.4;
        const color = new THREE.Color(`hsl(${(playerData.currentLevel * 40) % 360}, 60%, 50%)`);
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, 0, Math.PI * 1.6), new THREE.MeshPhongMaterial({ color: color }));
        const trap = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, Math.PI * 1.6, Math.PI * 0.4), new THREE.MeshPhongMaterial({ color: 0xff3333 }));
        p.add(mesh, trap);
        tower.add(p);
        platforms.push(p);
    }
    ball = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({ color: SKINS[playerData.currentSkin].color }));
    ball.position.set(0, 1, 2.5);
    scene.add(ball);
}

function animate() {
    requestAnimationFrame(animate);
    if (gameOver || document.getElementById('main-menu').style.display === 'flex') return;
    tower.rotation.y += 0.02 + (playerData.currentLevel * 0.001);
    if (isPressing) ballVelocity = smash; else ballVelocity += gravity;
    ball.position.y += ballVelocity;
    platforms.forEach((p, i) => {
        const diff = ball.position.y - p.position.y;
        if (diff < 0.2 && diff > -0.5) {
            let rot = (tower.rotation.y + p.rotation.y) % (Math.PI * 2);
            if (rot < 0) rot += Math.PI * 2;
            if (isPressing) {
                if (rot > 5.0 || rot < 0.1) { gameOver = true; document.getElementById('current-revive-score').innerText = score; document.getElementById('revive-menu').style.display = 'flex'; }
                else { p.visible = false; platforms.splice(i, 1); score += 10; document.getElementById('score').innerText = score; if (platforms.length === 0) endGame(); }
            } else if (ballVelocity < 0) { ballVelocity = bounce; ball.position.y = p.position.y + 0.3; }
        }
    });
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, ball.position.y + 6, 0.1);
    camera.lookAt(0, ball.position.y, 0);
    renderer.render(scene, camera);
}

function endGame() {
    playerData.currentLevel++;
    playerData.coins += 150;
    playerData.shields += 1;
    if (score > playerData.highScore) playerData.highScore = score;
    saveGame(); updateUI(); createLevel();
}
</script>
</body>
</html>
