<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stack Ball 3D - Fixed Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; user-select: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; }
        #score-container { font-size: 42px; font-weight: 900; line-height: 1; }
        #high-score-container { font-size: 14px; color: #aaa; text-transform: uppercase; }
        #coin-container { font-size: 22px; color: #ffd700; margin-top: 10px; font-weight: bold; }
        #level-progress { font-size: 16px; margin-top: 15px; background: rgba(255,255,255,0.1); display: inline-block; padding: 6px 20px; border-radius: 30px; }
        
        #message { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; display: none; text-align: center; background: rgba(0,0,0,0.9); 
            padding: 40px; border-radius: 24px; width: 70%; max-width: 350px; border: 2px solid #333;
        }
        h1 { margin: 0; font-size: 36px; text-transform: uppercase; }
        .tap-to-start { font-size: 16px; color: #4caf50; animation: blink 1s infinite; margin-top: 20px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score-container"><span id="score">0</span></div>
    <div id="high-score-container">BEST: <span id="highscore">0</span></div>
    <div id="coin-container">🪙 <span id="coins">0</span></div>
    <div id="level-progress">LEVEL <span id="level">1</span></div>
</div>

<div id="message">
    <h1 id="msg-text">GAME OVER</h1>
    <p id="final-stats"></p>
    <p class="tap-to-start">TAP TO RESTART</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, ball, tower;
let platforms = [];
let score = 0, coins = parseInt(localStorage.getItem('stackBallCoins')) || 0;
let highScore = parseInt(localStorage.getItem('stackBallHighScore')) || 0;
let currentLevel = 1, isPressing = false, gameOver = false;
let stackCount = 25, ballVelocity = 0;

const gravity = -0.012;
const bounceVelocity = 0.2;
const smashVelocity = -0.35;

const uiScore = document.getElementById('score'), uiHighScore = document.getElementById('highscore');
const uiCoins = document.getElementById('coins'), uiLevel = document.getElementById('level');
const uiMsg = document.getElementById('message'), uiStats = document.getElementById('final-stats');
const msgText = document.getElementById('msg-text');

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5, 10, 7.5);
    scene.add(light, new THREE.AmbientLight(0x404040, 1));

    uiCoins.innerText = coins;
    uiHighScore.innerText = highScore;
    createLevel();

    const press = (e) => { if(!gameOver) isPressing = true; if(e.cancelable) e.preventDefault(); };
    const release = () => isPressing = false;

    window.addEventListener('mousedown', press);
    window.addEventListener('mouseup', release);
    window.addEventListener('touchstart', press, {passive: false});
    window.addEventListener('touchend', release);
}

function createLevel() {
    if(tower) scene.remove(tower);
    if(ball) scene.remove(ball);
    platforms = [];
    gameOver = false;
    isPressing = false;
    uiMsg.style.display = 'none';
    score = 0;
    uiScore.innerText = score;
    stackCount = 20 + (currentLevel * 2);

    tower = new THREE.Group();
    scene.add(tower);

    const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.5, stackCount * 1.5 + 10, 32),
        new THREE.MeshPhongMaterial({ color: 0x111111 })
    );
    pillar.position.y = -(stackCount * 0.75);
    tower.add(pillar);

    const hue = (currentLevel * 140) % 360;

    for (let i = 0; i < stackCount; i++) {
        const platform = new THREE.Group();
        platform.position.y = -i * 1.5;
        // Spiral rotation
        platform.rotation.y = i * 0.3;

        // SAFE ZONE (Colored) - 270 degrees
        const segGeo = new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, 0, Math.PI * 1.5);
        const segMat = new THREE.MeshPhongMaterial({ color: new THREE.Color(`hsl(${hue}, 70%, 50%)`) });
        const mesh = new THREE.Mesh(segGeo, segMat);
        
        // TRAP ZONE (Black) - 90 degrees
        const trapGeo = new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, Math.PI * 1.5, Math.PI * 0.5);
        const trapMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
        const trapMesh = new THREE.Mesh(trapGeo, trapMat);
        trapMesh.userData.isTrap = true;

        platform.add(mesh, trapMesh);
        tower.add(platform);
        platforms.push(platform);
    }

    ball = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 32, 32),
        new THREE.MeshPhongMaterial({ color: 0xffffff })
    );
    ball.position.set(0, 1, 2.5); // Ball is locked to Z=2.5
    scene.add(ball);
}

function animate() {
    requestAnimationFrame(animate);
    if (gameOver) { renderer.render(scene, camera); return; }

    tower.rotation.y += 0.025; // Constant rotation

    if (isPressing) {
        ballVelocity = smashVelocity;
    } else {
        ballVelocity += gravity;
    }
    ball.position.y += ballVelocity;

    platforms.forEach((p, index) => {
        const diff = ball.position.y - p.position.y;
        
        // If ball hits the platform plane
        if (diff < 0.2 && diff > -0.5) {
            
            // Calculate absolute rotation of this platform relative to the ball (at Z axis)
            let worldRot = (tower.rotation.y + p.rotation.y) % (Math.PI * 2);
            if (worldRot < 0) worldRot += Math.PI * 2;

            // The ball is at a fixed angle (approx 0/2PI radians in local space)
            // Trap is between 1.5PI and 2PI (4.71 to 6.28 rad)
            const hittingTrap = worldRot > 4.75 && worldRot < 6.25;

            if (isPressing) {
                if (hittingTrap) {
                    endGame(false);
                } else {
                    p.visible = false;
                    platforms.splice(index, 1);
                    score += 10;
                    uiScore.innerText = score;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('stackBallHighScore', highScore);
                        uiHighScore.innerText = highScore;
                    }
                    if (platforms.length === 0) endGame(true);
                }
            } else if (ballVelocity < 0) {
                // Bounce back up
                ballVelocity = bounceVelocity;
                ball.position.y = p.position.y + 0.3; 
            }
        }
    });

    // Follow ball
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, ball.position.y + 6, 0.1);
    camera.lookAt(0, ball.position.y, 0);

    renderer.render(scene, camera);
}

function endGame(win) {
    gameOver = true;
    uiMsg.style.display = 'block';
    
    if (win) {
        msgText.innerText = "LEVEL CLEAR!";
        msgText.style.color = "#4CAF50";
        const earned = 50 + (currentLevel * 5);
        coins += earned;
        localStorage.setItem('stackBallCoins', coins);
        uiCoins.innerText = coins;
        uiStats.innerText = `Earned ${earned} coins!`;
        currentLevel++;
        uiLevel.innerText = currentLevel;
    } else {
        msgText.innerText = "CRASHED!";
        msgText.style.color = "#FF5252";
        uiStats.innerText = `Score: ${score}`;
    }

    setTimeout(() => {
        const restart = () => { createLevel(); window.removeEventListener('mousedown', restart); window.removeEventListener('touchstart', restart); };
        window.addEventListener('mousedown', restart);
        window.addEventListener('touchstart', restart);
    }, 1000);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
