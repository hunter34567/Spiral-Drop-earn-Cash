<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="monetag" content="fa1894d77a57d4e04ae7e12b0e1355e1">

    <title>Stack Ball Earn</title>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; user-select: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; }
        #score-container { font-size: 42px; font-weight: 900; line-height: 1; }
        #coin-container { font-size: 22px; color: #ffd700; margin-top: 10px; font-weight: bold; }
        #message { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; display: none; text-align: center; background: rgba(0,0,0,0.9); 
            padding: 40px; border-radius: 24px; width: 70%; max-width: 350px; border: 2px solid #333; z-index: 20;
        }
        canvas { display: block; touch-action: none; }
        .tap-to-start { font-size: 16px; color: #4caf50; animation: blink 1s infinite; margin-top: 20px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="ui">
    <div id="score-container"><span id="score">0</span></div>
    <div id="coin-container">🪙 <span id="coins">0</span></div>
    <div id="level-progress">LEVEL <span id="level">1</span></div>
</div>

<div id="message">
    <h1 id="msg-text">GAME OVER</h1>
    <p id="final-stats"></p>
    <p class="tap-to-start">TAP TO RESTART</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/** GAME LOGIC **/
let scene, camera, renderer, ball, tower, platforms = [];
let score = 0, coins = parseInt(localStorage.getItem('stackBallCoins')) || 0;
let currentLevel = 1, isPressing = false, gameOver = false;
let ballVelocity = 0, gravity = -0.012, bounce = 0.2, smash = -0.35;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5, 10, 7.5);
    scene.add(light, new THREE.AmbientLight(0x404040, 1));
    createLevel();
    window.addEventListener('mousedown', () => { if(!gameOver) isPressing = true; });
    window.addEventListener('mouseup', () => isPressing = false);
    window.addEventListener('touchstart', () => { if(!gameOver) isPressing = true; });
    window.addEventListener('touchend', () => isPressing = false);
}

function createLevel() {
    if(tower) scene.remove(tower);
    if(ball) scene.remove(ball);
    platforms = [];
    gameOver = false;
    document.getElementById('message').style.display = 'none';
    tower = new THREE.Group();
    scene.add(tower);
    const stackCount = 20 + (currentLevel * 2);
    for (let i = 0; i < stackCount; i++) {
        const p = new THREE.Group();
        p.position.y = -i * 1.5;
        p.rotation.y = i * 0.3;
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, 0, Math.PI * 1.5), new THREE.MeshPhongMaterial({ color: 0x4caf50 }));
        const trap = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, Math.PI * 1.5, Math.PI * 0.5), new THREE.MeshPhongMaterial({ color: 0x000000 }));
        trap.userData.isTrap = true;
        p.add(mesh, trap);
        tower.add(p);
        platforms.push(p);
    }
    ball = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({ color: 0xffffff }));
    ball.position.set(0, 1, 2.5);
    scene.add(ball);
}

function animate() {
    requestAnimationFrame(animate);
    if (gameOver) return;
    tower.rotation.y += 0.025;
    if (isPressing) ballVelocity = smash; else ballVelocity += gravity;
    ball.position.y += ballVelocity;
    platforms.forEach((p, i) => {
        const diff = ball.position.y - p.position.y;
        if (diff < 0.2 && diff > -0.5) {
            let rot = (tower.rotation.y + p.rotation.y) % (Math.PI * 2);
            if (rot < 0) rot += Math.PI * 2;
            if (isPressing) {
                if (rot > 4.75 && rot < 6.25) endGame(false);
                else { p.visible = false; platforms.splice(i, 1); score += 10; document.getElementById('score').innerText = score; if (platforms.length === 0) endGame(true); }
            } else if (ballVelocity < 0) { ballVelocity = bounce; ball.position.y = p.position.y + 0.3; }
        }
    });
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, ball.position.y + 6, 0.1);
    camera.lookAt(0, ball.position.y, 0);
    renderer.render(scene, camera);
}

function endGame(win) {
    gameOver = true;
    document.getElementById('message').style.display = 'block';
    
    // This calls the ad. Make sure you've added your Zone script to the head!
    if (window.show_8858712) window.show_8858712();

    if (win) {
        document.getElementById('msg-text').innerText = "WIN!";
        coins += 100;
        localStorage.setItem('stackBallCoins', coins);
        document.getElementById('coins').innerText = coins;
        currentLevel++;
    } else {
        document.getElementById('msg-text').innerText = "CRASH!";
    }
    setTimeout(() => { window.addEventListener('mousedown', createLevel, {once: true}); }, 1000);
}
</script>
</body>
</html>
