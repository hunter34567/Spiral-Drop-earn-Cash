<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiral Drop - Revive Update</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; user-select: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; display: none; }
        #score-container { font-size: 42px; font-weight: 900; }
        .stat-box { display: inline-block; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px; margin: 5px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
        
        /* MENU & UI STYLES */
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; color: white; }
        .play-btn { background: #4caf50; color: white; font-size: 28px; font-weight: bold; padding: 15px 60px; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin: 10px; }
        
        /* REVIVE MODAL */
        #revive-menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(30,30,30,0.95); width: 80%; max-width: 350px;
            border-radius: 30px; display: none; z-index: 100; flex-direction: column; padding: 30px;
            border: 2px solid #ff9800; color: white; text-align: center;
        }
        .revive-btn { background: #ff9800; border: none; color: white; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; width: 100%; }
        .shield-btn { background: #2196f3; border: none; color: white; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; width: 100%; }
        .skip-btn { color: #888; background: none; border: none; cursor: pointer; margin-top: 10px; }

        #shop-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,20,0.98); width: 85%; max-width: 400px; height: 70vh; border-radius: 30px; display: none; z-index: 110; flex-direction: column; padding: 20px; border: 2px solid #ffd700; color: white; overflow-y: auto; }
        .skin-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; margin: 10px 0; border-radius: 15px; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="font-size: 50px; color: #4caf50;">SPIRAL DROP</h1>
    <div style="margin-bottom: 20px;">
        <span class="stat-box">🪙 <span id="menu-coins">0</span></span>
        <span class="stat-box">🛡️ <span id="menu-shields">0</span></span>
    </div>
    <button class="play-btn" id="start-btn">PLAY</button>
    <button id="shop-btn-menu" style="background:#ffd700; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">🛒 SHOP</button>
</div>

<div id="ui">
    <div id="score-container"><span id="score">0</span></div>
    <div class="stat-box">🪙 <span id="coins">0</span></div>
    <div class="stat-box">🛡️ <span id="shields">0</span></div>
</div>

<div id="revive-menu">
    <h2 style="color: #ff9800;">CRASHED!</h2>
    <p>Keep your score of <span id="current-revive-score">0</span>?</p>
    <button class="revive-btn" id="coin-revive-btn">USE 🪙 200</button>
    <button class="shield-btn" id="shield-revive-btn">USE 🛡️ 1 SHIELD</button>
    <button class="skip-btn" id="skip-revive-btn">NO THANKS, RESTART</button>
</div>

<div id="shop-menu">
    <div id="close-shop" style="text-align:right; cursor:pointer;">✕</div>
    <h2 style="text-align: center; color: #ffd700;">SHOP</h2>
    <div id="skin-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/** DATA & SAVING **/
const SAVE_KEY = 'SpiralDrop_v3_Data';
let playerData = JSON.parse(localStorage.getItem(SAVE_KEY)) || {
    coins: 100,
    shields: 3,
    currentLevel: 1,
    currentSkin: 0,
    ownedSkins: [0]
};

const SKINS = [
    { name: "Default", color: 0xffffff, price: 0 },
    { name: "Neon", color: 0x32ff00, price: 500 },
    { name: "Shield Blue", color: 0x2196f3, price: 1000 }
];

function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify(playerData)); }

function updateUI() {
    document.getElementById('menu-coins').innerText = playerData.coins;
    document.getElementById('menu-shields').innerText = playerData.shields;
    document.getElementById('coins').innerText = playerData.coins;
    document.getElementById('shields').innerText = playerData.shields;
}

/** REVIVE LOGIC **/
const reviveMenu = document.getElementById('revive-menu');

function showRevive() {
    document.getElementById('current-revive-score').innerText = score;
    reviveMenu.style.display = 'flex';
}

document.getElementById('coin-revive-btn').onclick = () => {
    if (playerData.coins >= 200) {
        playerData.coins -= 200;
        continueGame();
    } else { alert("Not enough coins!"); }
};

document.getElementById('shield-revive-btn').onclick = () => {
    if (playerData.shields > 0) {
        playerData.shields -= 1;
        continueGame();
    } else { alert("No shields left!"); }
};

document.getElementById('skip-revive-btn').onclick = () => {
    reviveMenu.style.display = 'none';
    mainMenu.style.display = 'flex';
    ui.style.display = 'none';
    saveGame();
    updateUI();
};

function continueGame() {
    reviveMenu.style.display = 'none';
    gameOver = false;
    ball.position.y += 2; // Bounce ball up slightly
    ballVelocity = 0;
    saveGame();
    updateUI();
}

/** GAME ENGINE **/
let scene, camera, renderer, ball, tower, platforms = [];
let score = 0, isPressing = false, gameOver = false;
let ballVelocity = 0, gravity = -0.012, bounce = 0.2, smash = -0.35;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0x404040, 2), new THREE.DirectionalLight(0xffffff, 1));
    updateUI();

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        createLevel();
    };
    
    document.getElementById('shop-btn-menu').onclick = () => { document.getElementById('shop-menu').style.display = 'flex'; };
    document.getElementById('close-shop').onclick = () => { document.getElementById('shop-menu').style.display = 'none'; };

    window.addEventListener('mousedown', () => { if(!gameOver) isPressing = true; });
    window.addEventListener('mouseup', () => isPressing = false);
    window.addEventListener('touchstart', () => { if(!gameOver) isPressing = true; });
    window.addEventListener('touchend', () => isPressing = false);
}

function createLevel() {
    if(tower) scene.remove(tower);
    if(ball) scene.remove(ball);
    platforms = [];
    gameOver = false;
    score = 0;
    document.getElementById('score').innerText = "0";
    tower = new THREE.Group();
    scene.add(tower);

    const stackCount = 20;
    for (let i = 0; i < stackCount; i++) {
        const p = new THREE.Group();
        p.position.y = -i * 1.5;
        p.rotation.y = i * 0.4;
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, 0, Math.PI * 1.6), new THREE.MeshPhongMaterial({ color: 0x4caf50 }));
        const trap = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, Math.PI * 1.6, Math.PI * 0.4), new THREE.MeshPhongMaterial({ color: 0xff3333 }));
        p.add(mesh, trap);
        tower.add(p);
        platforms.push(p);
    }
    ball = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({ color: SKINS[playerData.currentSkin].color }));
    ball.position.set(0, 1, 2.5);
    scene.add(ball);
}

function animate() {
    requestAnimationFrame(animate);
    if (gameOver) return;

    tower.rotation.y += 0.02;
    if (isPressing) ballVelocity = smash; else ballVelocity += gravity;
    ball.position.y += ballVelocity;

    platforms.forEach((p, i) => {
        const diff = ball.position.y - p.position.y;
        if (diff < 0.2 && diff > -0.5) {
            let rot = (tower.rotation.y + p.rotation.y) % (Math.PI * 2);
            if (rot < 0) rot += Math.PI * 2;
            if (isPressing) {
                if (rot > 5.0 || rot < 0.1) endGame(false);
                else { p.visible = false; platforms.splice(i, 1); score += 10; document.getElementById('score').innerText = score; if (platforms.length === 0) endGame(true); }
            } else if (ballVelocity < 0) { ballVelocity = bounce; ball.position.y = p.position.y + 0.3; }
        }
    });

    camera.position.y = THREE.MathUtils.lerp(camera.position.y, ball.position.y + 6, 0.1);
    camera.lookAt(0, ball.position.y, 0);
    renderer.render(scene, camera);
}

function endGame(win) {
    if (win) {
        playerData.currentLevel++;
        playerData.coins += 100;
        playerData.shields += 1; // Reward a shield for every win!
        saveGame();
        updateUI();
        createLevel();
    } else {
        gameOver = true;
        showRevive();
    }
}
</script>
</body>
</html>
