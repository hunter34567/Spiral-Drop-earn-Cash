<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiral Drop - Legacy</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; user-select: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; }
        #score-container { font-size: 42px; font-weight: 900; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #stats-row { display: flex; justify-content: center; gap: 20px; margin-top: 5px; font-weight: bold; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #message { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; display: none; text-align: center; background: rgba(0,0,0,0.95); 
            padding: 40px; border-radius: 30px; width: 80%; max-width: 400px; border: 3px solid #4caf50; z-index: 20;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        canvas { display: block; touch-action: none; }
        .tap-to-start { font-size: 18px; color: #4caf50; animation: blink 1s infinite; margin-top: 20px; font-weight: bold; text-transform: uppercase; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        #best-score { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score-container"><span id="score">0</span></div>
    <div id="stats-row">
        <div class="stat-box">🪙 <span id="coins">0</span></div>
        <div class="stat-box">LVL <span id="level">1</span></div>
    </div>
    <div id="best-score">BEST: <span id="high-score">0</span></div>
</div>

<div id="message">
    <h1 id="msg-text">GAME OVER</h1>
    <div id="final-stats"></div>
    <p class="tap-to-start">Tap to Continue</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/** PROGRESS PERSISTENCE SYSTEM **/
const SAVE_KEY = 'SpiralDrop_PlayerData';
let playerData = JSON.parse(localStorage.getItem(SAVE_KEY)) || {
    coins: 0,
    currentLevel: 1,
    highScore: 0
};

function saveGame() {
    localStorage.setItem(SAVE_KEY, JSON.stringify(playerData));
}

function updateUI() {
    document.getElementById('coins').innerText = playerData.coins;
    document.getElementById('level').innerText = playerData.currentLevel;
    document.getElementById('high-score').innerText = playerData.highScore;
}

/** GAME LOGIC **/
let scene, camera, renderer, ball, tower, platforms = [];
let score = 0, isPressing = false, gameOver = false;
let ballVelocity = 0, gravity = -0.012, bounce = 0.2, smash = -0.35;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5, 10, 7.5);
    scene.add(light, new THREE.AmbientLight(0x404040, 1.5));

    updateUI();
    createLevel();

    window.addEventListener('mousedown', () => { if(!gameOver) isPressing = true; });
    window.addEventListener('mouseup', () => isPressing = false);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); if(!gameOver) isPressing = true; }, {passive: false});
    window.addEventListener('touchend', () => isPressing = false);
    window.addEventListener('resize', onWindowResize);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function createLevel() {
    if(tower) scene.remove(tower);
    if(ball) scene.remove(ball);
    platforms = [];
    gameOver = false;
    score = 0;
    document.getElementById('score').innerText = "0";
    document.getElementById('message').style.display = 'none';

    tower = new THREE.Group();
    scene.add(tower);

    // Level difficulty scales with currentLevel
    const stackCount = 15 + (playerData.currentLevel * 2);
    const color = new THREE.Color(`hsl(${(playerData.currentLevel * 40) % 360}, 60%, 50%)`);

    for (let i = 0; i < stackCount; i++) {
        const p = new THREE.Group();
        p.position.y = -i * 1.5;
        p.rotation.y = i * (0.2 + (Math.random() * 0.2));
        
        const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, 0, Math.PI * 1.6), 
            new THREE.MeshPhongMaterial({ color: color })
        );
        
        const trap = new THREE.Mesh(
            new THREE.CylinderGeometry(3, 3, 0.5, 32, 1, false, Math.PI * 1.6, Math.PI * 0.4), 
            new THREE.MeshPhongMaterial({ color: 0xff3333 })
        );
        trap.userData.isTrap = true;

        p.add(mesh, trap);
        tower.add(p);
        platforms.push(p);
    }

    ball = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({ color: 0xffffff }));
    ball.position.set(0, 1, 2.5);
    scene.add(ball);
}

function animate() {
    requestAnimationFrame(animate);
    if (gameOver) return;

    tower.rotation.y += 0.02 + (playerData.currentLevel * 0.002);

    if (isPressing) {
        ballVelocity = smash;
    } else {
        ballVelocity += gravity;
    }
    
    ball.position.y += ballVelocity;

    platforms.forEach((p, i) => {
        const diff = ball.position.y - p.position.y;
        if (diff < 0.2 && diff > -0.5) {
            let rot = (tower.rotation.y + p.rotation.y) % (Math.PI * 2);
            if (rot < 0) rot += Math.PI * 2;

            if (isPressing) {
                // Check if hit the red trap zone
                if (rot > 5.0 || rot < 0.1) { 
                    endGame(false); 
                } else { 
                    p.visible = false; 
                    platforms.splice(i, 1); 
                    score += 10;
                    document.getElementById('score').innerText = score;
                    if (platforms.length === 0) endGame(true);
                }
            } else if (ballVelocity < 0) {
                ballVelocity = bounce;
                ball.position.y = p.position.y + 0.3;
            }
        }
    });

    camera.position.y = THREE.MathUtils.lerp(camera.position.y, ball.position.y + 6, 0.1);
    camera.lookAt(0, ball.position.y, 0);
    renderer.render(scene, camera);
}

function endGame(win) {
    gameOver = true;
    
    if (win) {
        playerData.currentLevel++;
        playerData.coins += (score / 2);
        document.getElementById('msg-text').innerText = "LEVEL COMPLETE!";
        document.getElementById('msg-text').style.color = "#4caf50";
    } else {
        document.getElementById('msg-text').innerText = "CRASHED!";
        document.getElementById('msg-text').style.color = "#ff3333";
    }

    if (score > playerData.highScore) {
        playerData.highScore = score;
    }

    saveGame();
    updateUI();

    document.getElementById('message').style.display = 'block';
    setTimeout(() => {
        window.addEventListener('mousedown', createLevel, {once: true});
        window.addEventListener('touchstart', createLevel, {once: true});
    }, 500);
}
</script>
</body>
</html>
